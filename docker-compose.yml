services:
  scraper:
    build: .
    container_name: db_price_scraper
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Europe/Berlin
      - USER_AGENT=db-price-watcher
      - DB_PATH=/app/data/price_data.db
    env_file:
      - .env
    volumes:
      - ./data:/app/data